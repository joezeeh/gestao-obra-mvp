<!doctype html>
<html lang="pt-BR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Gestão de Obra</title>
    <link rel="stylesheet" href="styles.css?v=20260514-13" />
  </head>
  <body>
    <div class="app-shell">
      <header class="topbar">
        <div>
          <p class="eyebrow">MVP 1</p>
          <h1>Gestão de Obra</h1>
        </div>
        <div class="topbar-actions">
          <span class="user-pill" id="userEmail"></span>
          <button class="ghost-button" id="logoutButton" type="button">Sair</button>
        </div>
      </header>

      <section class="auth-view" id="authView">
        <form class="auth-panel" id="loginForm">
          <div>
            <p class="eyebrow">Acesso</p>
            <h2>Entrar no sistema</h2>
          </div>
          <label class="field">
            <span>E-mail</span>
            <input id="loginEmail" type="email" autocomplete="email" required />
          </label>
          <label class="field">
            <span>Senha</span>
            <input id="loginPassword" type="password" autocomplete="current-password" required />
          </label>
          <div class="auth-actions">
            <button class="primary-button" id="loginButton" type="submit">Entrar</button>
            <button class="ghost-button" id="signupButton" type="button">Criar acesso</button>
          </div>
          <p class="auth-message" id="authMessage"></p>
        </form>
      </section>

      <div class="workspace app-content">
        <nav class="tabs" aria-label="Navegação principal">
          <button class="tab active" data-view="setup" type="button"><span class="tab-icon">⚙</span><span>CONFIGURAÇÃO</span></button>
          <button class="tab" data-view="tracking" type="button"><span class="tab-icon">✓</span><span>APONTAMENTO</span></button>
          <button class="tab" data-view="review" type="button"><span class="tab-icon">▦</span><span>DASHBOARD</span></button>
          <button class="tab" data-view="panel" type="button"><span class="tab-icon">▣</span><span>PAINEL DE OBRA</span></button>
        </nav>

      <main>
        <section class="view active setup-view" id="setupView">
          <section class="config-hero">
            <div>
              <h2>Dados base do empreendimento</h2>
            </div>
            <div class="config-lock-actions">
              <button class="ghost-button" id="configLockToggle" type="button">Bloquear Configuração</button>
            </div>
          </section>

          <div class="config-grid">
            <section class="panel project-panel">
              <div class="panel-header">
                <h2>Obra</h2>
              </div>
              <div class="project-grid">
                <label class="field">
                  <span>Nome da obra</span>
                  <input id="projectName" class="grid-input" data-grid="project" data-row="0" data-col="0" type="text" />
                </label>
                <label class="field">
                  <span>Construtora</span>
                  <input id="builderName" class="grid-input" data-grid="project" data-row="0" data-col="1" type="text" />
                </label>
                <label class="field">
                  <span>Local</span>
                  <input id="projectLocation" class="grid-input wide-input" data-grid="project" data-row="1" data-col="0" type="text" />
                </label>
                <label class="field">
                  <span>Meta de entrega</span>
                  <input id="targetDeliveryDate" class="grid-input" data-grid="project" data-row="2" data-col="0" type="date" />
                </label>
              </div>
              <div class="asset-grid">
                <label class="asset-uploader">
                  <span>Logo da construtora</span>
                  <span class="asset-file-action">Escolher imagem</span>
                  <input id="builderLogo" type="file" accept="image/*" />
                  <img id="builderLogoPreview" alt="" />
                </label>
                <label class="asset-uploader">
                  <span>Foto da obra</span>
                  <span class="asset-file-action">Escolher imagem</span>
                  <input id="projectPhoto" type="file" accept="image/*" />
                  <img id="projectPhotoPreview" alt="" />
                </label>
              </div>
            </section>

          </div>

          <div class="config-grid lower-grid">
            <section class="panel table-panel">
              <div class="panel-header">
                <h2>Cadastro de Pavimentos</h2>
              </div>
              <div class="floor-entry-grid floor-entry-inline">
                <label class="field">
                  <span>Pavimento</span>
                  <input id="floorMatrixName" class="grid-input" data-grid="floorSeed" data-row="0" data-col="0" type="text" />
                </label>
                <label class="field">
                  <span>Unidades</span>
                  <input id="floorMatrixUnits" class="grid-input" data-grid="floorSeed" data-row="0" data-col="1" type="number" min="1" />
                </label>
                <label class="field">
                  <span>Repetições</span>
                  <input id="floorMatrixRepeat" class="grid-input" data-grid="floorSeed" data-row="0" data-col="2" type="number" min="1" />
                </label>
                <button class="primary-button icon-button" id="addFloorMatrix" type="button" title="Adicionar à matriz" aria-label="Adicionar à matriz">+</button>
              </div>
              <div class="floor-table-head" aria-hidden="true">
                <span></span>
                <span>Pavimento</span>
                <span>Qtd.</span>
                <span>Numeração</span>
                <span></span>
              </div>
              <div class="floor-list" id="floorList"></div>
            </section>

            <section class="panel table-panel">
              <div class="panel-header">
                <h2>Cadastro de Etapas</h2>
              </div>
              <div class="inline-form stage-form">
                <input id="stageName" type="text" />
                <button class="primary-button icon-button" id="addStage" type="button" title="Adicionar etapa" aria-label="Adicionar etapa">+</button>
              </div>
              <div class="stage-table-head" aria-hidden="true">
                <span></span>
                <span>Ordem</span>
                <span>Etapa</span>
                <span>Controle</span>
                <span>Máscara</span>
                <span></span>
              </div>
              <div class="stage-list" id="stageList"></div>
            </section>
          </div>
        </section>

        <section class="view" id="trackingView">
          <section class="work-header">
            <label class="field">
              <span>Etapa</span>
              <select id="trackingStage"></select>
            </label>
            <label class="field">
              <span>Atualização</span>
              <input id="updatedAt" type="datetime-local" />
            </label>
            <div class="stage-buttons">
              <button class="ghost-button square-button" id="previousStage" type="button" title="Etapa anterior">&lt;</button>
              <button class="ghost-button square-button" id="nextStage" type="button" title="Próxima etapa">&gt;</button>
            </div>
            <div class="progress-box">
              <strong id="trackingPercent">0,0%</strong>
              <span id="trackingCount">0 de 0 unidades</span>
            </div>
            <button class="primary-button upload-measurement-button" id="uploadMeasurement" type="button">SUBIR MEDI&Ccedil;&Atilde;O</button>
          </section>

          <section class="matrix-wrap">
            <div class="matrix" id="trackingMatrix"></div>
          </section>
        </section>

        <section class="view" id="reviewView">
          <section class="summary-strip" id="summaryStrip"></section>
          <section class="measurement-report" id="measurementReport"></section>
          <section class="trend-report" id="trendReport"></section>
        </section>

        <section class="view" id="panelView">
          <section class="print-panel-header" id="printPanelHeader"></section>
          <section class="review-grid" id="reviewGrid"></section>
        </section>
      </main>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js?v=20260514-13"></script>
  </body>
</html>
